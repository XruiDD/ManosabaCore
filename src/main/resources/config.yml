# =============================================================
# ManosabaCore Configuration
# =============================================================
# After editing, run /manosaba reload to apply changes.

# -------------------------------------------------------------
# proximity-chat: regional chat
# Limits chat messages to nearby players only, optionally
# blocked by solid walls between sender and receiver.
#
# Fixed permissions (not configurable):
#   manosaba.chat.bypass.send    - sender ignores proximity restrictions
#   manosaba.chat.bypass.receive - viewer always receives proximity-restricted chat
# -------------------------------------------------------------
proximity-chat:
  # Master switch for the feature.
  enabled: true

  # Maximum hearing radius (in blocks). Default 48.
  # Floats are accepted; values <= 0 disable proximity (treated as 0 -> only sender hears self).
  range: 48.0

  # Require an unobstructed line of sight between sender and receiver.
  # When true, walls / mountains block chat.
  require-line-of-sight: true

  # ---- Game-state gating ----
  # By default the proximity filter only activates while the Manosaba game is
  # actually running. When the game is not running (lobby / pre-start / ended),
  # chat reverts to vanilla global delivery.
  #
  # Detection contract from the datapack:
  #   scoreboard objective: 'Gaming'
  #   score holder:         'manosaba:data' (fakeplayer)
  #   value 1 = game running, 0 = lobby/ended, -1 = transition lock
  game-state:
    # If false, proximity filtering is always active regardless of game state.
    only-during-game: true
    # Scoreboard objective name (datapack contract).
    objective: 'Gaming'
    # Score holder / fakeplayer name (datapack contract).
    holder: 'manosaba:data'
    # Score value that means "in game".
    in-game-value: 1

  # ---- Dead-player handling ----
  # A "dead" player gets two chat privileges:
  #   - dead-hear-all       : hears every message regardless of distance / walls
  #   - dead-silenced-to-living : their messages are hidden from alive players
  dead:
    # How to detect death.
    #   scoreboard - read the datapack 'dead' dummy objective (per-player, holder = player name)
    #                value 1 = dead, anything else / unset = alive
    #   spectator  - GameMode.SPECTATOR is treated as dead
    mode: scoreboard

    # Players considered dead receive every chat regardless of distance / walls.
    # Effectively makes the death state a "monitor" view.
    dead-hear-all: true

    # Messages sent by a dead player are NOT delivered to alive players.
    # Other dead players (and bypass-receive holders) still receive them.
    dead-silenced-to-living: true

    # ---- Used only when mode == scoreboard ----
    # Scoreboard objective name (datapack contract).
    objective: 'dead'

    # Score value that means "dead".
    dead-value: 1

# -------------------------------------------------------------
# voicechat: Simple Voice Chat (henkelmax) integration
# -------------------------------------------------------------
# Requires the Simple Voice Chat plugin installed alongside ManosabaCore.
# When a player is dead (per the same dead-state config above) they are
# moved into a persistent ISOLATED voice group; living players in the same
# group cannot hear them and they cannot hear living players' voice.
#
# Note: dead-group-name and sync-period-ticks only apply on full plugin
# (re)enable, not from /manosaba reload, because the group is built once
# and the sync task is scheduled once.
voicechat:
  # Master switch. When false, no voice integration is performed even if SVC is installed.
  enabled: true

  # Display name of the group that dead players are moved into.
  dead-group-name: 'Spectator'

  # How often (in server ticks) to recheck every player's death state and
  # move them between the dead group and "no group". 20 ticks = 1 second.
  sync-period-ticks: 20
