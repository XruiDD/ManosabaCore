# =============================================================
# ManosabaCore Configuration
# =============================================================
# After editing, run /manosaba reload to apply changes.

# -------------------------------------------------------------
# proximity-chat: regional chat
# Limits chat messages to nearby players only, optionally
# blocked by solid walls between sender and receiver.
#
# Fixed permissions (not configurable):
#   manosaba.chat.bypass.send    - sender ignores proximity restrictions
#   manosaba.chat.bypass.receive - viewer always receives proximity-restricted chat
# -------------------------------------------------------------
proximity-chat:
  # Master switch for the feature.
  enabled: true

  # Maximum hearing radius (in blocks). Default 48.
  # Floats are accepted; values <= 0 disable proximity (treated as 0 -> only sender hears self).
  range: 48.0

  # Require an unobstructed line of sight between sender and receiver.
  # When true, walls / mountains block chat.
  require-line-of-sight: true

  # ---- Spectator pool ----
  # Dead players and non-Playing observers form ONE unified "spectator pool":
  # they freely chat with each other (no distance / wall checks among them),
  # share the same voicechat group, and follow the two policies below toward
  # active players.
  #
  # Sender side ↓
  #   - active alive : normal proximity rules among active; reaches spectator
  #                    pool only if spectators-hear-all is true
  #   - active dead  : reaches active alive only if !spectators-silenced-to-active;
  #                    always reaches the spectator pool
  #   - observer     : symmetric to active-dead from the active side's POV
  #
  # Detection (which players belong to which side) is configured separately
  # in the `dead` and `playing` sections below.
  spectators-hear-all: true
  spectators-silenced-to-active: true

  # ---- Game-state gating ----
  # By default the proximity filter only activates while the Manosaba game is
  # actually running. When the game is not running (lobby / pre-start / ended),
  # chat reverts to vanilla global delivery.
  #
  # Detection contract from the datapack:
  #   scoreboard objective: 'Gaming'
  #   score holder:         'manosaba:data' (fakeplayer)
  #   value 1 = game running, 0 = lobby/ended, -1 = transition lock
  game-state:
    # If false, proximity filtering is always active regardless of game state.
    only-during-game: true
    # Scoreboard objective name (datapack contract).
    objective: 'Gaming'
    # Score holder / fakeplayer name (datapack contract).
    holder: 'manosaba:data'
    # Score value that means "in game".
    in-game-value: 1

  # ---- Dead-player detection ----
  # Selects players for the spectator pool by death state.
  # The chat policy itself is `proximity-chat.spectators-*` above.
  dead:
    # How to detect death.
    #   scoreboard - read the datapack 'dead' dummy objective (per-player, holder = player name)
    #                value 1 = dead, anything else / unset = alive
    #   spectator  - GameMode.SPECTATOR is treated as dead
    mode: scoreboard

    # ---- Used only when mode == scoreboard ----
    # Scoreboard objective name (datapack contract).
    objective: 'dead'

    # Score value that means "dead".
    dead-value: 1

  # ---- Playing-state detection ----
  # Selects non-Playing players for the spectator pool.
  # The chat policy itself is `proximity-chat.spectators-*` above.
  #
  # Datapack 'Playing' dummy objective values:
  #   1 = actively in this round (game_start promotes ready=1 -> Playing=1)
  #   0 = not in this round (lobby idle / mid-join / didn't ready up)
  #   2 = playing the lobby minigame (separate state machine)
  playing:
    # When false, the Playing check is skipped entirely (everyone is treated
    # as actively playing — only the dead/alive distinction remains).
    enabled: true

    # Scoreboard objective name (datapack contract).
    objective: 'Playing'

    # Score value that means "actively playing this round".
    playing-value: 1

  # ---- Chat formatting (full renderer) ----
  # When enabled, ManosabaCore takes complete control of the chat line
  # rendering — the vanilla "<name> message" format is NOT used. The
  # `template` below is rendered for each chat message with three
  # MiniMessage placeholders substituted in:
  #
  #   <prefix>  - channel tag chosen from { alive, dead, observer, global, lobby } below
  #               (alive    = sender is active and alive)
  #               (dead     = sender is active but dead)
  #               (observer = sender is non-Playing during a running round)
  #               (global   = sender holds manosaba.chat.bypass.send)
  #               (lobby    = game-state gate is on but the game is not running;
  #                           everyone hears everyone, prefix marks the channel)
  #   <sender>  - sender's display name (other plugins' prefixes/colors apply)
  #   <message> - the typed message
  #
  # MiniMessage syntax: https://docs.advntr.dev/minimessage/
  # Set enabled: false to skip the renderer entirely (vanilla rendering).
  chat-format:
    enabled: true

    template: '<prefix><sender><dark_gray> » </dark_gray><message>'

    # Channel prefix substituted into <prefix> above. Empty string drops it.
    alive:    '<dark_gray>「</dark_gray><green>附近</green><dark_gray>」</dark_gray> '
    dead:     '<dark_gray>「</dark_gray><dark_purple>死亡</dark_purple><dark_gray>」</dark_gray> '
    observer: '<dark_gray>「</dark_gray><gray>旁观</gray><dark_gray>」</dark_gray> '
    global:   '<dark_gray>「</dark_gray><gold>全部</gold><dark_gray>」</dark_gray> '
    lobby:    '<dark_gray>「</dark_gray><aqua>大厅</aqua><dark_gray>」</dark_gray> '

  # ---- TalkBubbles (Fabric client mod) integration ----
  # When enabled, the plugin emits a 'talkbubbles:bubble' plugin message for
  # every chat event carrying the player's RAW typed text (so the channel
  # prefix added by chat-format above does NOT show inside the bubble).
  # The bubble is only delivered to clients that registered the channel
  # during the vanilla minecraft:register handshake — vanilla clients are
  # silently skipped and can join the server normally without the mod.
  # Bubble proximity uses the same range / line-of-sight as proximity-chat.
  talkbubbles:
    enabled: true

# -------------------------------------------------------------
# voicechat: Simple Voice Chat (henkelmax) integration
# -------------------------------------------------------------
# Requires the Simple Voice Chat plugin installed alongside ManosabaCore.
# When a player is dead (per the same dead-state config above) they are
# moved into a persistent ISOLATED voice group; living players in the same
# group cannot hear them and they cannot hear living players' voice.
#
# Note: dead-group-name and sync-period-ticks only apply on full plugin
# (re)enable, not from /manosaba reload, because the group is built once
# and the sync task is scheduled once.
voicechat:
  # Master switch. When false, no voice integration is performed even if SVC is installed.
  enabled: true

  # Display name of the group that dead players are moved into.
  dead-group-name: 'Spectator'

  # How often (in server ticks) to recheck every player's death state and
  # move them between the dead group and "no group". 20 ticks = 1 second.
  sync-period-ticks: 20
